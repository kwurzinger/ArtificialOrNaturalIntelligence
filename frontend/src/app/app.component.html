<div id="rootContent">
  <div class="toolbar" role="banner">
    <div id="logo-block">
      <img id="logo" src="/assets/Logo.png" width="80px" height="80px"/>
      <span id="logo-text">ArtificialOrNaturalIntelligence</span>
    </div>

    <h1 id="header">
      <span class="header-ai">AI</span>
      <span class="header-sep"> or </span>
      <span class="header-human">Human</span>
    </h1>

    <button class="mode-toggle" (click)="toggleMode()" [attr.aria-label]="isDarkMode ? 'Light-Modus aktivieren' : 'Dark-Modus aktivieren'">
      <span class="toggle-indicator" [class.right]="!isDarkMode"></span>
      <span class="toggle-label" [class.active]="isDarkMode">Dark</span>
      <span class="toggle-label" [class.active]="!isDarkMode">Light</span>
    </button>
  </div>

  <div *ngIf="isQuestionView()" class="main">
    <app-question></app-question>
  </div>

  <div *ngIf="isResultView()" class="main">
    <app-result></app-result>
  </div>

  <div *ngIf="isAdminView()" class="admin-main">
    <app-admin></app-admin>
  </div>

  <div *ngIf="isFinishView()" class="main finish-view">
    <div class="finish-inner">
      <p class="finish-label">Quiz abgeschlossen</p>
      <h1 class="finish-title">Resultate</h1>
      <div class="level-results">
        <div *ngFor="let level of levels" class="level-row">
          <span class="level-name">Level {{level}}</span>
          <span class="level-value">{{getLevelResult(level)}}</span>
        </div>
      </div>
      <p id="score">Score: {{getScore()}}</p>
      <button id="btnRestart" (click)="restartGame();">Neustart</button>
    </div>
  </div>
</div>
