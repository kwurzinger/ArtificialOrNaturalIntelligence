server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /assets/config.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        expires off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}