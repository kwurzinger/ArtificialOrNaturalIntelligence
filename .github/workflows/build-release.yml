name: Build and release as zip file

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  docker-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          
      - name: build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: create and release zip
        run: |
          zip -r artificialornaturalintelligence-${GITHUB_SHA}.zip . -x ".github/*" ".git/*" "frontend/.angular/*" "documentation/*"
          gh release upload ${GITHUB_SHA} artificialornaturalintelligence-${GITHUB_SHA}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}