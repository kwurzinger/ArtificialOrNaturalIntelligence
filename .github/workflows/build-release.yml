name: Build and release as zip file

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Package build artifacts
        run: |
          mkdir -p release

          cp -r backend/dist release/backend
          cp -r frontend/dist release/frontend

          zip -r "artificialornaturalintelligence-${GITHUB_SHA}.zip" release

      - name: Create GitHub release
        run: |
          gh release create "${GITHUB_SHA}" \
            "artificialornaturalintelligence-${GITHUB_SHA}.zip" \
            --title "Release ${GITHUB_SHA}" \
            --notes "Automated release for commit ${GITHUB_SHA}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
