name: Build and release as zip file

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Prepare release variables
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=build-${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "ZIP_NAME=artificialornaturalintelligence-${SHORT_SHA}.zip" >> "$GITHUB_ENV"

      - name: Package build artifacts
        run: |
          mkdir -p release

          cp -r backend/dist release/backend
          cp -r frontend/dist release/frontend

          cd release
          zip -r "../$ZIP_NAME" .

      - name: Create GitHub release
        run: |
          gh release create "$RELEASE_TAG" \
            "$ZIP_NAME" \
            --title "Release $RELEASE_TAG" \
            --notes "Automated release for commit ${GITHUB_SHA}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
