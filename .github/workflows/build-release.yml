name: Build and release as zip file

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build -- --base-href /artificialornaturalintelligence/

      - name: Prepare release variables
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=build-${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "ZIP_NAME=artificialornaturalintelligence-${SHORT_SHA}.zip" >> "$GITHUB_ENV"

      - name: Package build artifacts
        run: |
          mkdir -p release/backend
          mkdir -p release/frontend/artificialornaturalintelligence

          cp -a backend/dist release/backend/
          cp backend/package.json release/backend/
          cp backend/package-lock.json release/backend/

          FRONTEND_DIST_DIR=$(find frontend/dist -mindepth 1 -maxdepth 1 -type d | head -n 1)

          if [ -z "$FRONTEND_DIST_DIR" ]; then
            echo "No frontend dist directory found."
            exit 1
          fi

          cp -a "$FRONTEND_DIST_DIR"/. release/frontend/artificialornaturalintelligence/

          cp frontend/nginx.conf release/nginx.sample.conf
          cp frontend/.htaccess release/frontend/artificialornaturalintelligence/

          cp INSTALL.md release/

          cd release
          zip -r "../$ZIP_NAME" .

      - name: Create GitHub release
        run: |
          gh release create "$RELEASE_TAG" \
            "$ZIP_NAME" \
            --title "Release $RELEASE_TAG" \
            --notes "Automated release for commit ${GITHUB_SHA}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
